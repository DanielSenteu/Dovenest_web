<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="../images/dove_logo.png">
  <link rel="apple-touch-icon" href="../images/dove_logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Invites — DoveNest Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #04111f; --surface: #0d2137;
      --border: rgba(255,255,255,0.07);
      --gold: #E8A020; --gold-dim: rgba(232,160,32,0.12);
      --text: #e8f0f8; --muted: rgba(255,255,255,0.45);
    }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }
    .topbar { height: 56px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 12px; position: sticky; top: 0; z-index: 50; }
    .topbar-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; margin-right: auto; }
    .topbar-logo img { height: 26px; filter: brightness(0) invert(1); opacity: 0.9; }
    .admin-badge { font-size: 9px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); background: var(--gold-dim); padding: 2px 7px; border-radius: 4px; border: 1px solid rgba(232,160,32,0.25); }
    .topbar-email { font-size: 0.78rem; color: var(--muted); }
    .signout-btn { font-size: 0.78rem; font-weight: 600; color: var(--muted); background: none; border: 1px solid rgba(255,255,255,0.1); border-radius: 7px; padding: 5px 12px; cursor: pointer; font-family: 'Poppins', sans-serif; transition: color 0.2s, border-color 0.2s; }
    .signout-btn:hover { color: #fff; border-color: rgba(255,255,255,0.25); }
    .layout { display: flex; flex: 1; }
    .sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); padding: 20px 0; flex-shrink: 0; }
    .nav-section { padding: 0 12px; margin-bottom: 24px; }
    .nav-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 0 8px; margin-bottom: 8px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 8px; font-size: 0.82rem; font-weight: 500; color: var(--muted); cursor: pointer; transition: background 0.15s, color 0.15s; text-decoration: none; border: none; background: none; width: 100%; font-family: 'Poppins', sans-serif; text-align: left; }
    .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
    .nav-item.active { background: var(--gold-dim); color: var(--gold); }
    .nav-item svg { flex-shrink: 0; }
    .main { flex: 1; padding: 32px 36px; overflow-x: hidden; max-width: 820px; }
    .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--muted); margin-bottom: 20px; }
    .breadcrumb a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
    .breadcrumb a:hover { color: var(--text); }
    .breadcrumb span { color: rgba(255,255,255,0.2); }
    .breadcrumb .current { color: var(--text); font-weight: 500; }
    .page-header { margin-bottom: 28px; }
    .page-header h1 { font-size: 1.2rem; font-weight: 700; color: #fff; }
    .page-header p { font-size: 0.8rem; color: var(--muted); margin-top: 4px; }

    /* add form */
    .add-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 24px 28px; margin-bottom: 24px; }
    .add-card-title { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.13em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 16px; }
    .add-row { display: flex; gap: 12px; align-items: flex-end; }
    .add-row .field { flex: 1; }
    .add-row label { display: block; font-size: 0.72rem; font-weight: 600; color: var(--muted); margin-bottom: 7px; }
    .add-row input { width: 100%; padding: 0.65rem 0.9rem; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: #fff; font-family: 'Poppins', sans-serif; font-size: 0.875rem; outline: none; transition: border-color 0.2s; }
    .add-row input::placeholder { color: rgba(255,255,255,0.25); }
    .add-row input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
    .add-btn { padding: 0.65rem 20px; background: var(--gold); color: #0d2137; font-family: 'Poppins', sans-serif; font-size: 0.82rem; font-weight: 700; border: none; border-radius: 8px; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
    .add-btn:hover:not(:disabled) { background: #d4911a; }
    .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .field-error { font-size: 0.75rem; color: #fca5a5; margin-top: 6px; }

    /* table */
    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; }
    .table-card-header { padding: 16px 20px; border-bottom: 1px solid var(--border); }
    .table-card-header span { font-size: 0.85rem; font-weight: 600; color: #fff; }
    table { width: 100%; border-collapse: collapse; }
    th { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.25); padding: 12px 20px; text-align: left; }
    tbody tr { border-top: 1px solid rgba(255,255,255,0.04); }
    td { font-size: 0.82rem; padding: 14px 20px; color: var(--text); }
    td.muted { color: var(--muted); font-size: 0.78rem; }
    .badge { display: inline-block; font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
    .badge-open { background: rgba(232,160,32,0.12); color: #E8A020; }
    .badge-used { background: rgba(34,197,94,0.12); color: #86efac; }
    .revoke-btn { font-size: 0.72rem; font-weight: 600; color: rgba(239,68,68,0.6); background: none; border: none; cursor: pointer; font-family: 'Poppins', sans-serif; padding: 2px 6px; border-radius: 4px; transition: color 0.15s; }
    .revoke-btn:hover { color: #fca5a5; }
    .table-empty { padding: 48px 18px; text-align: center; color: var(--muted); font-size: 0.85rem; }

    .spinner { width: 26px; height: 26px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #guard { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    #app   { display: none; flex-direction: column; min-height: 100vh; }
  </style>
</head>
<body>

<div id="guard">
  <div style="text-align:center;">
    <div class="spinner" style="margin:0 auto 14px;"></div>
    <p style="font-size:0.8rem;color:rgba(255,255,255,0.4);">Verifying session…</p>
  </div>
</div>

<div id="app">
  <header class="topbar">
    <a class="topbar-logo" href="dashboard.html">
      <img src="../images/dovenest-logo-2.jpeg" alt="DoveNest">
      <span class="admin-badge">Admin</span>
    </a>
    <span class="topbar-email" id="userEmail"></span>
    <button class="signout-btn" onclick="handleSignout()">Sign out</button>
  </header>

  <div class="layout">
    <nav class="sidebar">
      <div class="nav-section">
        <p class="nav-label">Main</p>
        <a class="nav-item" href="dashboard.html">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Overview
        </a>
      </div>
      <div class="nav-section">
        <p class="nav-label">Submissions</p>
        <a class="nav-item" href="quotes.html">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          Motor Quotes
        </a>
        <a class="nav-item" href="reviews.html">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          Client Reviews
        </a>
        <a class="nav-item" href="last-expense.html">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          Last Expense
        </a>
      </div>
      <div class="nav-section">
        <p class="nav-label">Settings</p>
        <a class="nav-item active" href="invites.html">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M18 9v3m0 0v3m0-3h3m-3 0h-3M13 7a4 4 0 11-8 0 4 4 0 018 0zM6 21v-2a4 4 0 014-4h2"/></svg>
          Admin Invites
        </a>
      </div>
    </nav>

    <main class="main">
      <div class="breadcrumb">
        <a href="dashboard.html">Overview</a>
        <span>/</span>
        <span class="current">Admin Invites</span>
      </div>

      <div class="page-header">
        <h1>Admin Invites</h1>
        <p>Only invited emails can create an admin account. Invites are single-use.</p>
      </div>

      <div class="add-card">
        <p class="add-card-title">Send Invite</p>
        <div class="add-row">
          <div class="field">
            <label>Email Address</label>
            <input type="email" id="inviteEmail" placeholder="colleague@dovenest.com"
                   onkeydown="if(event.key==='Enter') addInvite()">
            <p class="field-error" id="inviteError" style="display:none;"></p>
          </div>
          <button class="add-btn" id="addBtn" onclick="addInvite()">Add Invite</button>
        </div>
      </div>

      <div class="table-card">
        <div class="table-card-header"><span>Invited Accounts</span></div>
        <div id="tableWrap" style="display:flex;justify-content:center;padding:40px;">
          <div class="spinner"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const sb = window.supabase.createClient(
  'https://tbokejycxpaefpccynbh.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRib2tlanljeHBhZWZwY2N5bmJoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2MTUzNzYsImV4cCI6MjA5MzE5MTM3Nn0.OlP4LaptamkDbQ9MgJGv1NIEO2KfobWW0k-X6ensYEw'
);

let allInvites = [];
let currentUserEmail = '';

(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.replace('login.html'); return; }
  const { data: aal } = await sb.auth.mfa.getAuthenticatorAssuranceLevel();
  if (aal.currentLevel !== 'aal2') { window.location.replace('login.html'); return; }

  currentUserEmail = session.user.email;
  document.getElementById('userEmail').textContent = currentUserEmail;
  document.getElementById('guard').style.display = 'none';
  document.getElementById('app').style.display = 'flex';

  loadInvites();
})();

async function handleSignout() { await sb.auth.signOut(); window.location.replace('login.html'); }

async function loadInvites() {
  const { data, error } = await sb.from('admin_invites').select('*').order('invited_at', { ascending: false });
  if (error) {
    document.getElementById('tableWrap').innerHTML = `<p class="table-empty">Failed to load: ${error.message}</p>`;
    return;
  }
  allInvites = data || [];
  renderTable();
}

function renderTable() {
  if (allInvites.length === 0) {
    document.getElementById('tableWrap').innerHTML = `<p class="table-empty">No invites yet. Add one above.</p>`;
    return;
  }
  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead><tr><th>Email</th><th>Invited By</th><th>Date Added</th><th>Status</th><th></th></tr></thead>
      <tbody>
        ${allInvites.map(inv => `
          <tr>
            <td>${esc(inv.email)}</td>
            <td class="muted">${esc(inv.invited_by || '—')}</td>
            <td class="muted">${fmtDate(inv.invited_at)}</td>
            <td><span class="badge ${inv.used_at ? 'badge-used' : 'badge-open'}">${inv.used_at ? 'Used' : 'Open'}</span></td>
            <td style="text-align:right;">
              ${!inv.used_at ? `<button class="revoke-btn" onclick="revokeInvite('${esc(inv.email)}')">Revoke</button>` : ''}
            </td>
          </tr>`).join('')}
      </tbody>
    </table>`;
}

async function addInvite() {
  const input = document.getElementById('inviteEmail');
  const errEl = document.getElementById('inviteError');
  const btn   = document.getElementById('addBtn');
  const email = input.value.trim().toLowerCase();

  errEl.style.display = 'none';

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(email)) {
    errEl.textContent = 'Please enter a valid email address.';
    errEl.style.display = 'block';
    return;
  }
  if (allInvites.some(i => i.email === email)) {
    errEl.textContent = 'This email already has an invite.';
    errEl.style.display = 'block';
    return;
  }

  btn.disabled = true; btn.textContent = 'Adding…';
  const { error } = await sb.from('admin_invites').insert({ email, invited_by: currentUserEmail });
  btn.disabled = false; btn.textContent = 'Add Invite';

  if (error) { errEl.textContent = error.message; errEl.style.display = 'block'; return; }
  input.value = '';
  await loadInvites();
}

async function revokeInvite(email) {
  if (!confirm(`Revoke invite for ${email}?`)) return;
  const { error } = await sb.from('admin_invites').delete().eq('email', email);
  if (error) { alert('Failed to revoke: ' + error.message); return; }
  await loadInvites();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
</script>
</body>
</html>
